<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="zyye博客系统 - 分享技术、生活和思考">
  <meta name="keywords" content="博客,技术,JavaScript,CSS,HTML">
  <meta name="author" content="博主">
  <title>zyye博客系统</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">
</head>

<body>
  <header>
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">zyye博客</a>
        <ul class="nav-links">
          <li><a href="index.html">首页</a></li>
          <li><a href="blog.html">文章</a></li>
          <li><a href="about.html">关于</a></li>
          <li><a href="contact.html">联系</a></li>
        </ul>
        <div class="nav-actions">
          <button class="theme-toggle" aria-label="切换主题">
            <span class="theme-icon theme-icon-light">☀️</span>
            <span class="theme-icon theme-icon-dark">🌙</span>
          </button>
          <button class="hamburger" aria-label="菜单">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>欢迎来到zyye博客</h1>
        <p>分享技术、生活和思考，记录成长点滴</p>
        <div class="hero-buttons">
          <a href="blog.html" class="btn btn-primary">浏览文章</a>
          <a href="about.html" class="btn btn-secondary">了解更多</a>
        </div>
      </div>
    </section>

    <section class="container">
      <h2 class="section-title">最新文章</h2>
      <div class="posts-grid">
        <div class="loading">加载中...</div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer__content">
        <div class="footer__section">
          <h3>关于本站</h3>
          <p>这是一个基于HTML、CSS和JavaScript开发的现代化zyye博客系统。</p>
        </div>
        <div class="footer__section">
          <h3>快速链接</h3>
          <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="blog.html">文章</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="contact.html">联系</a></li>
          </ul>
        </div>
        <div class="footer__section">
          <h3>联系方式</h3>
          <ul>
            <li>邮箱: zys6606@163.com</li>
            <li>GitHub: <a href="https://github.com/xiaobaizys" target="_blank">@xiaobaizys</a></li>
          </ul>
        </div>
      </div>
      <div class="footer__bottom">
        <p>&copy; 2026 zyye博客系统. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <button class="back-to-top" aria-label="返回顶部">↑</button>

  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const postsGrid = document.querySelector('.posts-grid');
      if (postsGrid) {
        postsGrid.innerHTML = '';
        await blogManager.loadPosts();
        const recentPosts = blogManager.getRecentPosts(6);
        postsGrid.innerHTML = recentPosts.map(post => blogManager.createPostCard(post)).join('');
      }
    });
  </script>
  <script src="js/blog.js"></script>
</body>

</html>
