<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="博客文章列表">
  <meta name="keywords" content="博客,文章,技术">
  <meta name="author" content="博主">
  <title>文章列表 - zyye博客系统</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>
  <header>
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">zyye博客</a>
        <ul class="nav-links">
          <li><a href="index.html">首页</a></li>
          <li><a href="blog.html">文章</a></li>
          <li><a href="about.html">关于</a></li>
          <li><a href="contact.html">联系</a></li>
        </ul>
        <div class="nav-actions">
          <button class="theme-toggle" aria-label="切换主题">
            <span class="theme-icon theme-icon-light">☀️</span>
            <span class="theme-icon theme-icon-dark">🌙</span>
          </button>
          <button class="hamburger" aria-label="菜单">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="container">
      <h2 class="section-title">所有文章</h2>
      
      <div class="search-bar">
        <input type="text" class="search-bar__input" placeholder="搜索文章..." aria-label="搜索文章">
      </div>

      <div class="filters">
        <button class="filter-button active" data-category="all">全部</button>
        <button class="filter-button" data-category="技术">技术</button>
        <button class="filter-button" data-category="生活">生活</button>
      </div>

      <div class="posts-grid">
        <div class="loading">加载中...</div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer__content">
        <div class="footer__section">
          <h3>关于本站</h3>
          <p>这是一个基于HTML、CSS和JavaScript开发的现代化zyye博客系统。</p>
        </div>
        <div class="footer__section">
          <h3>快速链接</h3>
          <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="blog.html">文章</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="contact.html">联系</a></li>
          </ul>
        </div>
        <div class="footer__section">
          <h3>联系方式</h3>
          <ul>
            <li>邮箱: zys6606@163.com</li>
            <li>GitHub: <a href="https://github.com/xiaobaizys" target="_blank">@xiaobaizys</a></li>
          </ul>
        </div>
      </div>
      <div class="footer__bottom">
        <p>&copy; 2026 zyye博客系统. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <button class="back-to-top" aria-label="返回顶部">↑</button>

  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const postsGrid = document.querySelector('.posts-grid');
      if (postsGrid) {
        postsGrid.innerHTML = '';
        await blogManager.loadPosts();
        blogManager.renderPosts();
        blogManager.loadLikeStates();
      }
    });
  </script>
  <script src="js/blog.js"></script>
</body>
</html>
