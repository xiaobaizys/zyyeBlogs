<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="联系我">
  <meta name="keywords" content="联系,联系方式">
  <meta name="author" content="博主">
  <title>联系 - zyye博客系统</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">
</head>

<body>
  <header>
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">zyye博客</a>
        <ul class="nav-links">
          <li><a href="index.html">首页</a></li>
          <li><a href="blog.html">文章</a></li>
          <li><a href="about.html">关于</a></li>
          <li><a href="contact.html">联系</a></li>
        </ul>
        <div class="nav-actions">
          <button class="theme-toggle" aria-label="切换主题">
            <span class="theme-icon theme-icon-light">☀️</span>
            <span class="theme-icon theme-icon-dark">🌙</span>
          </button>
          <button class="hamburger" aria-label="菜单">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="container">
      <h2 class="section-title">联系我</h2>

      <div class="contact-form">
        <form data-validate>
          <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" required placeholder="请输入您的姓名">
          </div>

          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" required placeholder="请输入您的邮箱">
          </div>

          <div class="form-group">
            <label for="subject">主题</label>
            <input type="text" id="subject" name="subject" required placeholder="请输入消息主题">
          </div>

          <div class="form-group">
            <label for="message">消息</label>
            <textarea id="message" name="message" required placeholder="请输入您的消息内容"></textarea>
          </div>

          <button type="submit" class="btn btn-primary">发送消息</button>
        </form>
      </div>

      <div style="margin-top: 3rem; text-align: center;">
        <h3>其他联系方式</h3>
        <p style="margin-top: 1rem; color: var(--text-muted);">
          邮箱: zys6606@163.com<br>
          GitHub: <a href="https://github.com/xiaobaizys" target="_blank">@xiaobaizys</a><br>
          微博: @yourusername
        </p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer__content">
        <div class="footer__section">
          <h3>关于本站</h3>
          <p>这是一个基于HTML、CSS和JavaScript开发的现代化zyye博客系统。</p>
        </div>
        <div class="footer__section">
          <h3>快速链接</h3>
          <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="blog.html">文章</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="contact.html">联系</a></li>
          </ul>
        </div>
        <div class="footer__section">
          <h3>联系方式</h3>
          <ul>
            <li>邮箱: zys6606@163.com</li>
            <li>GitHub: <a href="https://github.com/xiaobaizys" target="_blank">@xiaobaizys</a></li>
          </ul>
        </div>
      </div>
      <div class="footer__bottom">
        <p>&copy; 2026 zyye博客系统. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <button class="back-to-top" aria-label="返回顶部">↑</button>

  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/blog.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const contactForm = document.querySelector('.contact-form form');
      if (contactForm) {
        contactForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          const formData = new FormData(contactForm);
          const data = Object.fromEntries(formData.entries());

          console.log('Form submitted:', data);

          alert('感谢您的留言！我们会尽快回复您。');
          contactForm.reset();
        });
      }
    });
  </script>
</body>

</html>
